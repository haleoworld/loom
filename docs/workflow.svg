<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 1110" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#7aa2ff"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5ec98a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="780" height="1110" fill="#0f1115"/>

  <text x="390" y="44" fill="#e6e9ef" font-size="27" font-weight="700" text-anchor="middle">How Loom works</text>
  <text x="390" y="70" fill="#8b94a7" font-size="14" text-anchor="middle">think in fragments · let AI carry the thread · stay coherent across your life</text>

  <!-- FRAME -->
  <rect x="30" y="92" width="720" height="196" rx="14" fill="none" stroke="#39445c" stroke-dasharray="5 5"/>
  <text x="46" y="116" fill="#8b94a7" font-size="12" letter-spacing="1.5">THE FIXED FRAME — WHAT EVERYTHING IS MEASURED AGAINST</text>

  <rect x="58" y="132" width="312" height="132" rx="12" fill="#171a21" stroke="#2a3040"/>
  <text x="76" y="162" fill="#7aa2ff" font-size="17" font-weight="600">◎ GLOBAL</text>
  <text x="76" y="190" fill="#e6e9ef" font-size="14">Ultimate life goals</text>
  <text x="76" y="214" fill="#e6e9ef" font-size="14">Thinking models</text>
  <text x="76" y="240" fill="#8b94a7" font-size="12">(the reference frame)</text>

  <rect x="410" y="132" width="312" height="132" rx="12" fill="#171a21" stroke="#2a3040"/>
  <text x="428" y="162" fill="#7aa2ff" font-size="17" font-weight="600">▣ PROJECTS</text>
  <text x="428" y="190" fill="#e6e9ef" font-size="14">A goal + your role</text>
  <text x="428" y="214" fill="#e6e9ef" font-size="14">per domain</text>
  <text x="428" y="240" fill="#8b94a7" font-size="12">(work · family · skill …)</text>

  <line x1="410" y1="198" x2="378" y2="198" stroke="#5ec98a" stroke-width="2" marker-end="url(#arrowG)"/>
  <text x="394" y="124" fill="#5ec98a" font-size="11" text-anchor="middle">serve ↑</text>

  <!-- frame -> loop -->
  <line x1="390" y1="288" x2="390" y2="324" stroke="#7aa2ff" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- LOOP container -->
  <rect x="30" y="330" width="720" height="700" rx="14" fill="none" stroke="#39445c" stroke-dasharray="5 5"/>
  <text x="46" y="354" fill="#8b94a7" font-size="12" letter-spacing="1.5">THE LOOP — CAPTURE → THINK → SORT → ZOOM OUT</text>

  <!-- 1 capture -->
  <rect x="96" y="368" width="588" height="92" rx="12" fill="#171a21" stroke="#2a3040"/>
  <text x="118" y="398" fill="#e6e9ef" font-size="16" font-weight="600">① CAPTURE a fragment</text>
  <text x="118" y="423" fill="#8b94a7" font-size="13">text or voice · keyboard dictation (EN / 粵)</text>
  <text x="118" y="445" fill="#8b94a7" font-size="13">Just-log (tired) · Engage-AI (focused) · ↳ auto-suggests a thread</text>
  <line x1="390" y1="460" x2="390" y2="494" stroke="#7aa2ff" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- 2 thread -->
  <rect x="96" y="498" width="588" height="80" rx="12" fill="#171a21" stroke="#2a3040"/>
  <text x="118" y="528" fill="#e6e9ef" font-size="16" font-weight="600">② THREAD — a line of thinking</text>
  <text x="118" y="554" fill="#8b94a7" font-size="13">fragments feed in · depth grows 1→4 (surface → committed)</text>
  <line x1="390" y1="578" x2="390" y2="612" stroke="#7aa2ff" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="402" y="599" fill="#7aa2ff" font-size="12">Engage-AI</text>

  <!-- 3 question -->
  <rect x="96" y="616" width="588" height="98" rx="12" fill="#171a21" stroke="#2a3040"/>
  <text x="118" y="646" fill="#e6e9ef" font-size="16" font-weight="600">③ ONE hard QUESTION — via Claude</text>
  <text x="118" y="671" fill="#8b94a7" font-size="13">copy prompt → paste in Claude app → record the Q&amp;A</text>
  <text x="118" y="693" fill="#8b94a7" font-size="13">references your goals &amp; threads · replies in your language</text>
  <line x1="390" y1="714" x2="390" y2="748" stroke="#7aa2ff" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- 4 sort -->
  <rect x="96" y="752" width="588" height="80" rx="12" fill="#171a21" stroke="#2a3040"/>
  <text x="118" y="782" fill="#e6e9ef" font-size="16" font-weight="600">④ SORT to close — a real outcome required</text>
  <text x="118" y="808" font-size="14">
    <tspan fill="#5ec98a" font-weight="600">decision</tspan><tspan fill="#8b94a7">  ·  </tspan><tspan fill="#5ec98a" font-weight="600">action</tspan><tspan fill="#8b94a7">  ·  </tspan><tspan fill="#e07a7a" font-weight="600">kill</tspan><tspan fill="#8b94a7">  ·  </tspan><tspan fill="#b58be0" font-weight="600">park</tspan>
  </text>
  <line x1="390" y1="832" x2="390" y2="866" stroke="#7aa2ff" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- 5 coherence -->
  <rect x="72" y="870" width="636" height="146" rx="12" fill="#171a21" stroke="#39445c"/>
  <text x="94" y="900" fill="#7aa2ff" font-size="16" font-weight="600">⑤ COHERENCE CHECK — zoom out, 3 levels</text>
  <text x="94" y="928" fill="#e6e9ef" font-size="13.5"><tspan fill="#7aa2ff" font-weight="600">A</tspan>  your frame vs itself — are goals &amp; models consistent?</text>
  <text x="94" y="952" fill="#e6e9ef" font-size="13.5"><tspan fill="#7aa2ff" font-weight="600">B</tspan>  frame vs projects (vertical) — do they serve the goals?</text>
  <text x="94" y="976" fill="#e6e9ef" font-size="13.5"><tspan fill="#7aa2ff" font-weight="600">C</tspan>  project vs project (horizontal) — do any conflict?</text>
  <text x="94" y="1000" fill="#8b94a7" font-size="12.5">→ surfaces hidden risks &amp; drift, then you re-rank</text>

  <!-- return loop arrow on the right -->
  <path d="M708 943 C 762 900, 762 360, 726 308" fill="none" stroke="#e0b65a" stroke-width="2.5" stroke-dasharray="6 5" marker-end="url(#arrow)" opacity="0.9"/>
  <text x="755" y="640" fill="#e0b65a" font-size="12" text-anchor="middle" transform="rotate(90 755 640)">re-rank · reprioritize · iterate</text>

  <!-- footer -->
  <text x="390" y="1058" fill="#5c6577" font-size="12.5" text-anchor="middle">All data lives on your Mac Mini (~/.loom) · syncs to your phone over Tailscale · works offline</text>
  <text x="390" y="1080" fill="#5c6577" font-size="12.5" text-anchor="middle">Loom · self-hosted · single file</text>
</svg>
