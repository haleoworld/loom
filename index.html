<style>
  :root{
    --bg:#0f1115; --surface:#171a21; --surface2:#1f2430; --line:#2a3040;
    --text:#e6e9ef; --muted:#8b94a7; --faint:#5c6577;
    --accent:#7aa2ff; --accent-dim:#2d3a5c;
    --good:#5ec98a; --warn:#e0b65a; --bad:#e07a7a; --park:#b58be0;
    --radius:14px; --tap:44px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--bg); color:var(--text);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased; overscroll-behavior-y:none;
  }
  #app{max-width:680px; margin:0 auto; padding:env(safe-area-inset-top) 0 0;}
  header{
    position:sticky; top:0; z-index:20; background:rgba(15,17,21,.9);
    backdrop-filter:blur(10px); border-bottom:1px solid var(--line);
    padding:calc(env(safe-area-inset-top) + 10px) 16px 10px;
    display:flex; align-items:center; gap:10px;
  }
  header h1{font-size:16px; margin:0; font-weight:600; letter-spacing:.2px;}
  header .sub{color:var(--muted); font-size:12px; margin-left:auto; text-align:right;}
  main{padding:14px 16px 96px; min-height:60vh;}
  h2{font-size:13px; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); margin:22px 0 10px; font-weight:600;}

  .card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:14px; margin-bottom:10px;}

  .row{display:flex; align-items:center; gap:10px;}
  .col{display:flex; flex-direction:column; gap:8px;}
  .grow{flex:1; min-width:0;}
  .muted{color:var(--muted);} .faint{color:var(--faint);} .sm{font-size:12px;}

  .pill.active{color:var(--accent); border-color:var(--accent-dim);}
  .pill.sorted{color:var(--good);} .pill.killed{color:var(--bad);} .pill.parked{color:var(--park);}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block;}
  .dot.sorted{background:var(--good);} .dot.killed{background:var(--bad);} .dot.parked{background:var(--park);}
  textarea,input,select{

  button:active{transform:scale(.985);}

<body>
<div id="app">
  <header>
    <h1 id="hTitle">Loom</h1>
    <div class="sub" id="hSub"></div>
  </header>
  <main id="main"></main>
</div>
<nav><div class="inner" id="nav"></div></nav>
<div id="modalRoot"></div>
<div id="toast"></div>

<script>
"use strict";
/* ============================================================
   Loom — single-file thinking-continuity PWA
   Three layers: Global (models + life goals) → Projects (goal + role) → Threads
   Storage: localStorage (one JSON blob). Backup via JSON export/import.
   ============================================================ */

const KEY = "thread.v1";
const DEFAULT_DOMAINS = [
  ["work","Work / Career"],
  ["family-finance","Finance"],
  ["family-parenting","Parenting"],
  ["relationship","Relationships"],
  ["health","Health"],
  ["skill","Skill / Craft"],
  ["growth","Growth / Learning"],
  ["personal","Personal / Other"],
];
const DEFAULT_FRAG_TYPES = ["event","decision","observation","relationship","metric","question","feeling"];
const DEPTHS = {1:"surface",2:"exploring",3:"deciding",4:"committed"};

/* ---------- state ---------- */
let S = load();
let UI = { tab:"capture", threadId:null, projectId:null, captureMode:"just_log" };

function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw) return migrate(JSON.parse(raw));
  }catch(e){ console.warn("load failed",e); }
  return { global:{models:[],goals:[]}, projects:[], threads:[], fragments:[], turns:[], domains:DEFAULT_DOMAINS.map(d=>[d[0],d[1]]), fragTypes:DEFAULT_FRAG_TYPES.slice(), meta:{lastBackup:0,updatedAt:0} };
}
function migrate(s){
  s.global = s.global || {models:[],goals:[]};
  s.global.models = s.global.models || []; s.global.goals = s.global.goals || [];
  s.projects = s.projects||[]; s.threads=s.threads||[]; s.fragments=s.fragments||[]; s.turns=s.turns||[];
  if(!Array.isArray(s.domains) || !s.domains.length) s.domains = DEFAULT_DOMAINS.map(d=>[d[0],d[1]]);
  if(!Array.isArray(s.fragTypes) || !s.fragTypes.length) s.fragTypes = DEFAULT_FRAG_TYPES.slice();
  s.meta = s.meta||{lastBackup:0,updatedAt:0};
  if(s.meta.updatedAt==null) s.meta.updatedAt=0;
  return s;
}
function persist(){ try{ localStorage.setItem(KEY, JSON.stringify(S)); }catch(e){ toast("⚠️ Save failed — storage full?"); } }
function save(){ S.meta.updatedAt = now(); persist(); schedulePush(); }
function uid(){ return Math.random().toString(36).slice(2,9)+(S.fragments.length+S.threads.length+S.turns.length); }
function now(){ return Date.now(); }

/* ---------- helpers ---------- */
const el = id => document.getElementById(id);
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function domainLabel(d){ const m=(S.domains||[]).find(x=>x[0]===d); return m?m[1]:(d||"—"); }
function domainSlug(label){ let base=(label||"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"").slice(0,24)||"domain"; let k=base,n=1; while((S.domains||[]).some(d=>d[0]===k)) k=base+"-"+(++n); return k; }
function project(id){ return S.projects.find(p=>p.id===id); }
function thread(id){ return S.threads.find(t=>t.id===id); }
function threadFragments(id){ return S.fragments.filter(f=>f.threadId===id).sort((a,b)=>a.createdAt-b.createdAt); }
function threadTurns(id){ return S.turns.filter(t=>t.threadId===id).sort((a,b)=>a.createdAt-b.createdAt); }
function activeThreads(){ return S.threads.filter(t=>t.status==="active"); }
function fmtDate(ts){ if(!ts) return ""; const d=new Date(ts); return d.toLocaleDateString(undefined,{month:"short",day:"numeric"}); }
function daysAgo(ts){ if(!ts) return 0; return Math.floor((now()-ts)/86400000); }
function ago(ts){ const d=daysAgo(ts); if(d===0)return"today"; if(d===1)return"1d ago"; return d+"d ago"; }

function toast(msg){ const t=el("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2200); }
async function copy(text){
  const w = (text.match(/\S+/g)||[]).length;
  const note = w>3000 ? ` · ${w.toLocaleString()} words (long — consider closing/parking threads)` : ` · ${w.toLocaleString()} words`;
  try{ await navigator.clipboard.writeText(text); toast("📋 Copied"+note); }
  catch(e){ showCopyFallback(text); }
}
function showCopyFallback(text){
  openSheet("Copy this", `<p class="muted sm">Tap and hold to select, then copy:</p><pre class="export">${esc(text)}</pre><div class="btnrow"><button class="primary grow" data-act="closeSheet">Done</button></div>`);
}

/* ============================================================
   CLAUDE PROMPT BUILDERS — the heart of Phase 1
   ============================================================ */
function globalBlock(){
  const goals = S.global.goals.length ? S.global.goals.map((g,i)=>`  ${i+1}. ${g}`).join("\n") : "  (none recorded yet)";
  const models = S.global.models.length ? S.global.models.map(m=>`  - ${m}`).join("\n") : "  (none recorded yet)";
  return `## MY GLOBAL FRAME\nUltimate life goals (the fixed reference everything must serve):\n${goals}\n\nThinking models / principles I try to reason by:\n${models}`;
}
function projectBlock(p){
  if(!p) return "## PROJECT\n  (this thread isn't linked to a project)";
  return `## PROJECT: ${p.name} [${domainLabel(p.domain)}]\nGoal: ${p.goal||"(not set)"}\nMy role in it: ${p.role||"(not set)"}`;
}
function siblingProjectsBlock(exceptId){
  const others = S.projects.filter(p=>p.id!==exceptId);
  if(!others.length) return "## OTHER PROJECTS (must coexist without conflict)\n  (none)";
  return "## OTHER PROJECTS (my decisions here must coexist with these)\n" +
    others.map(p=>`  - ${p.name} [${domainLabel(p.domain)}] — goal: ${p.goal||"?"}; my role: ${p.role||"?"}`).join("\n");
}
function threadHistoryBlock(t){
  const FMAX=60, TMAX=30;
  const allF = threadFragments(t.id), allT = threadTurns(t.id);
  const frags = allF.slice(-FMAX), turns = allT.slice(-TMAX);
  const fTrim = allF.length>FMAX ? `  …(${allF.length-FMAX} earlier fragments omitted to keep this manageable)\n` : "";
  const tTrim = allT.length>TMAX ? `  …(${allT.length-TMAX} earlier Q&A omitted)\n\n` : "";
  const fragTxt = frags.length ? fTrim+frags.map(f=>`  [${fmtDate(f.createdAt)}${f.type?", "+f.type:""}] ${f.body}`).join("\n") : "  (no fragments yet)";
  const turnTxt = turns.length ? tTrim+turns.map(t2=>`  Q: ${t2.question}\n  A: ${t2.answer||"(unanswered)"}`).join("\n\n") : "  (no prior Q&A)";
  return `## THREAD: ${t.title}\nDomain: ${domainLabel(t.domain)} | depth: ${t.depthLevel} (${DEPTHS[t.depthLevel]}) | opened ${ago(t.openedAt)}\n\nFragments fed into it (oldest→newest):\n${fragTxt}\n\nPrior Q&A on this thread:\n${turnTxt}`;
}
function relatedResolvedBlock(t){
  const rel = S.threads.filter(x=>x.id!==t.id && x.status!=="active" && x.outcome && (x.projectId===t.projectId || x.domain===t.domain))
    .sort((a,b)=>(b.sortedAt||b.lastActivityAt)-(a.sortedAt||a.lastActivityAt)).slice(0,20);
  if(!rel.length) return "## MY PAST DECISIONS ON RELATED THREADS (same project / domain)\n  (none yet)";
  return "## MY PAST DECISIONS ON RELATED THREADS (same project / domain — use these to catch repetition or contradiction)\n" +
    rel.map(x=>`  - "${x.title}" → ${(x.outcome.type||"").toUpperCase()}: ${x.outcome.content}`).join("\n");
}
function questionPrompt(t){
  const p = project(t.projectId);
  return `You are my thinking partner. Your job is NOT to summarize. Read everything below, then output EXACTLY ONE question — the single most useful question to advance my thinking on this thread right now.

${globalBlock()}

${projectBlock(p)}

${siblingProjectsBlock(t.projectId)}

${threadHistoryBlock(t)}

${relatedResolvedBlock(t)}

## HOW TO CHOOSE THE QUESTION (priority order)
1. Contradiction: current state conflicts with something I said earlier in this thread → name both, ask which holds.
2. Coexistence conflict: this thread's likely direction clashes with another project's goal/role above → surface it.
3. Vertical drift: this thread is drifting from my global life goals → ask the question that re-tests alignment.
4. Pattern / repetition: this thread repeats or contradicts one of MY PAST DECISIONS above (especially something I killed) → name it and ask what's different now.
5. Missing axis: I've only explored one dimension → ask about the unexamined one (e.g. cost of NOT doing it).
6. Depth probe: I've been "exploring" too long → "What would have to be true for you to decide today?"
7. Action gap: many observations, no decision → "What decision is this thread waiting for?"

## RULES
- Output ONE question only. No preamble, no summary, no list.
- It MUST reference something specific above (a prior entry, a stated value, or a named project). No generic questions.
- Reply in the language my entries are written in (e.g. Cantonese / 廣東話 if my fragments are in Cantonese).
- End with one line: "Not the right question? Because ___" so I can redirect you.`;
}
function coherencePrompt(){
  const projTxt = S.projects.length ? S.projects.map(p=>`  - ${p.name} [${domainLabel(p.domain)}] — goal: ${p.goal||"?"}; my role: ${p.role||"?"}`).join("\n") : "  (no projects yet)";
  const TMAX=30;
  const allA = activeThreads().slice().sort((a,b)=>b.lastActivityAt-a.lastActivityAt);
  const actives = allA.slice(0,TMAX);
  const aNote = allA.length>TMAX ? `  …(${allA.length-TMAX} more active threads omitted — a lot are open; closing/parking some will sharpen this)\n` : "";
  const threadTxt = actives.length ? aNote+actives.map(t=>{
    const p=project(t.projectId);
    const last = threadFragments(t.id).slice(-2).map(f=>f.body).join(" / ") || "(no fragments)";
    return `  - "${t.title}" [${p?p.name:"no project"} / ${domainLabel(t.domain)}, depth ${t.depthLevel}, ${ago(t.lastActivityAt)}]\n      recent: ${last}`;
  }).join("\n") : "  (no active threads yet)";
  const CMAX=40;
  const closedAll = S.threads.filter(t=>t.status!=="active" && t.outcome).sort((a,b)=>(b.sortedAt||b.lastActivityAt)-(a.sortedAt||a.lastActivityAt));
  const closed = closedAll.slice(0,CMAX);
  const cNote = closedAll.length>CMAX ? `  …(${closedAll.length-CMAX} older resolved threads omitted)\n` : "";
  const closedTxt = closed.length ? cNote+closed.map(t=>{
    const o=t.outcome;
    return `  - "${t.title}" → ${(o.type||"").toUpperCase()}: ${o.content}${o.deadline?` (by ${fmtDate(o.deadline)})`:""}`;
  }).join("\n") : "  (nothing resolved yet)";
  return `You are auditing the COHERENCE of my life. Be a rigorous critic, not a cheerleader.

${globalBlock()}

## MY PROJECTS
${projTxt}

## MY ACTIVE THREADS (live decisions in flight)
${threadTxt}

## RESOLVED HISTORY (what I've already decided / acted on / killed / parked — and why)
${closedTxt}

## CHECK ALL THREE LEVELS (+ my history)
A) WITHIN MY FRAME (global vs itself) — Are my life goals mutually consistent, or do any pull against each other (e.g. frugality vs. generously supporting family; financial independence vs. close relationships; "alone is fine" vs. interdependence)? Do my stated thinking models actually fit these goals, or am I keeping models I don't really live by? Name any internal tension or contradiction in the frame itself.
B) FRAME vs PROJECTS (vertical) — Does each project / active thread genuinely serve a life goal? Where is something drifting from a goal I claim matters? If I have no projects/threads yet, instead tell me: what projects do these life goals IMPLY I should have, and which goal currently has nothing serving it?
C) PROJECT vs PROJECT (horizontal) — Do my projects / threads compete or contradict each other for time, money, energy, or values?
D) PATTERN & CONSISTENCY (vs my RESOLVED HISTORY) — Am I reopening or repeating something I already killed (and what was the stated reason)? Does any active thread contradict a decision I already made? Is a parked thread's wake-up condition now met? Call out repetition and rationalization.

## OUTPUT
- Lead with the single most important incoherence across any level.
- Then the rest, each with: the tension, which goals/projects/threads it's between, and the one sharpest question to resolve it.
- End with the blind spot I'm most likely avoiding because it's uncomfortable.
Reference items by name. Reply in the language my entries are written in.`;
}

/* ============================================================
   PHASE 2 — friction reducers: voice capture, thread auto-suggest,
   structured markdown export. All client-side, no new cost/dependency.
   ============================================================ */
const STOP = new Set("the a an and or but if then else of to in on for with at by from is are was were be been being it its this that these those i you he she they we me my your our their as so do does did not no yes will would should could can about into over under than what when how who whom which there here have has had get got want need".split(" "));
function stem(w){ return w.length>3 ? w.replace(/ies$/,"y").replace(/s$/,"") : w; }   // light plural folding (Latin)
function keyTokens(s){
  const out=new Set();
  // Latin words
  (((s||"").toLowerCase().match(/[a-z0-9']+/g))||[]).forEach(w=>{ if(w.length>2 && !STOP.has(w)) out.add(stem(w)); });
  // CJK (Cantonese/Chinese): no spaces — index character bigrams (+ single-char fallback)
  ((s||"").match(/[㐀-鿿]+/g)||[]).forEach(run=>{
    if(run.length===1) out.add(run);
    else for(let i=0;i<run.length-1;i++) out.add(run.slice(i,i+2));
  });
  return [...out];
}
function suggestThreads(text, max){
  const qs=new Set(keyTokens(text)); if(!qs.size) return [];
  return activeThreads().map(t=>{
    const p=project(t.projectId);
    const title=new Set(keyTokens(t.title));
    const bag=new Set(keyTokens(t.title+" "+threadFragments(t.id).map(f=>f.body).join(" ")+" "+(p?p.name+" "+(p.goal||""):"")));
    let score=0; qs.forEach(w=>{ if(bag.has(w)) score += title.has(w)?2:1; });
    return {t,score};
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score).slice(0,max||3).map(x=>x.t);
}
function capInput(){
  const ta=el("capBody"); if(!ta) return;
  capDraft = ta.value;                 // keep the draft so re-renders (mode toggle, tab switch) don't wipe it
  const sug=el("capSuggest"); if(!sug) return;
  const sel=el("capThread");
  if(sel && sel.value){ const t=thread(sel.value); sug.innerHTML=`<div class="sm" style="margin:8px 2px;color:var(--accent)">→ attaching to “${esc(t?t.title:'')}” <span class="faint" data-act="unpickSuggest" style="cursor:pointer">(undo)</span></div>`; return; }
  const words=ta.value.trim().split(/\s+/).filter(Boolean);
  const matches = words.length>=3 ? suggestThreads(ta.value,3) : [];
  if(!matches.length){ sug.innerHTML=""; return; }
  sug.innerHTML=`<div class="sm muted" style="margin:8px 2px 4px">Looks like it belongs to:</div><div class="chips">`+matches.map(t=>`<span class="chip" data-act="pickSuggest" data-tid="${t.id}">↳ ${esc(t.title)}</span>`).join("")+`</div>`;
}
function fragmentText(f){
  const t = thread(f.threadId);
  const p = t ? project(t.projectId) : null;
  const fatigue = f.fatigueLevel ? ["fresh","ok","fried"][f.fatigueLevel-1] : null;
  const lines = [
    `Fragment — ${new Date(f.createdAt).toLocaleString()}`,
    f.type ? `Type: ${f.type}` : null,
    fatigue ? `Fatigue: ${fatigue}` : null,
    `Thread: ${t ? t.title : "(unassigned)"}`,
    p ? `Project: ${p.name} [${domainLabel(p.domain)}]` : null,
    f.mode ? `Mode: ${f.mode}` : null,
    f.voiceId ? `Voice note: yes` : null,
    ``,
    f.body,
  ].filter(x => x !== null);
  return lines.join("\n");
}
function threadMarkdown(t){
  const p=project(t.projectId);
  let md=`# ${t.title}\n\n- Domain: ${domainLabel(t.domain)}\n- Status: ${t.status} · depth ${t.depthLevel} (${DEPTHS[t.depthLevel]})\n`;
  if(p) md+=`- Project: ${p.name} — goal: ${p.goal||"?"}; role: ${p.role||"?"}\n`;
  const fr=threadFragments(t.id), tn=threadTurns(t.id);
  md+=`\n## Fragments\n`+(fr.length?fr.map(f=>`- [${fmtDate(f.createdAt)}${f.type?", "+f.type:""}] ${f.body}`).join("\n"):"_none_");
  md+=`\n\n## Q&A\n`+(tn.length?tn.map(x=>`**Q:** ${x.question}\n\n**A:** ${x.answer||"_unanswered_"}`).join("\n\n"):"_none_");
  if(t.outcome) md+=`\n\n## Outcome — ${t.outcome.type}\n${t.outcome.content}${t.outcome.deadline?`\n- by ${fmtDate(t.outcome.deadline)}`:""}`;
  return md;
}
function corpusMarkdown(){
  let md=`# Loom export\n\n## Global frame\n**Life goals:**\n${S.global.goals.map(g=>"- "+g).join("\n")||"- (none)"}\n\n**Thinking models:**\n${S.global.models.map(m=>"- "+m).join("\n")||"- (none)"}\n\n## Projects\n${S.projects.map(p=>`- **${p.name}** [${domainLabel(p.domain)}] — goal: ${p.goal||"?"}; role: ${p.role||"?"}`).join("\n")||"- (none)"}\n\n## Threads\n`;
  [...S.threads].sort((a,b)=>b.lastActivityAt-a.lastActivityAt).forEach(t=>{ md+="\n"+threadMarkdown(t)+"\n\n---\n"; });
  return md;
}
/* voice — record audio → upload to the Mini → local Whisper (auto-detects English/Cantonese).
   Works on iOS (recording is allowed even though live recognition isn't). */
function recordOK(){ return !!(SYNC && SYNC.transcribe && navigator.mediaDevices && navigator.mediaDevices.getUserMedia && window.MediaRecorder); }  // function (not const) so it reads SYNC at call-time — avoids referencing SYNC before it's declared
let mediaRec=null, mediaChunks=[], recording=false, pendingAudio=null;
function setRecStatus(t){ const e=el("recStatus"); if(e) e.textContent=t||""; }
function updateRec(){ const b=el("recBtn"); if(b){ b.textContent=recording?"⏹ Stop":"● Rec"; b.style.color=recording?"var(--bad)":""; b.style.borderColor=recording?"var(--bad)":""; } }
async function recordToggle(){
  if(!recordOK()){ toast("Recording needs the Mini — it's offline"); return; }
  if(recording){ try{ mediaRec.stop(); }catch(e){} return; }
  let stream;
  try{ stream = await navigator.mediaDevices.getUserMedia({audio:true}); }
  catch(e){ toast("🎤 allow microphone access"); return; }
  mediaChunks=[];
  try{ mediaRec = new MediaRecorder(stream); }catch(e){ try{ mediaRec = new MediaRecorder(stream,{}); }catch(e2){ toast("recording unsupported"); stream.getTracks().forEach(t=>t.stop()); return; } }
  mediaRec.ondataavailable=e=>{ if(e.data && e.data.size) mediaChunks.push(e.data); };
  mediaRec.onstop=async ()=>{
    recording=false; updateRec();
    stream.getTracks().forEach(t=>t.stop());
    if(!mediaChunks.length){ setRecStatus(""); return; }
    await transcribeBlob(new Blob(mediaChunks,{type:mediaRec.mimeType||"audio/mp4"}));
  };
  mediaRec.start(); recording=true; updateRec(); setRecStatus("● recording… tap Stop when done"); toast("● recording…");
}
async function transcribeBlob(blob){
  setRecStatus("transcribing on your Mini…");
  try{
    const r=await fetch(SYNC.transcribe,{method:"POST",headers:{Authorization:"Bearer "+SYNC.token,"Content-Type":blob.type||"application/octet-stream"},body:blob});
    if(!r.ok) throw new Error(r.status);
    const j=await r.json();
    setRecStatus("");
    showTranscriptConfirm(j.text||"", j.audioId, j.bytes);
  }catch(e){ setRecStatus(""); toast("Transcription failed — try again, or just type"); }
}
function showTranscriptConfirm(text, audioId, bytes){
  openSheet("Is this what you said?", `
    <p class="muted sm">Edit if needed, then keep it. Language was auto-detected.</p>
    <textarea id="tcText" rows="5">${esc(text)}</textarea>
    <input type="hidden" id="tcAudio" value="${esc(audioId||'')}"/>
    <input type="hidden" id="tcBytes" value="${bytes||0}"/>
    <div class="btnrow" style="margin-top:14px">
      <button class="primary grow" data-act="useTranscript">Use this</button>
      <button class="grow" data-act="reRecord">Re-record</button>
      <button class="ghost" data-act="discardTranscript">Discard</button>
    </div>
  `);
}
function deleteAudio(id){ if(!id || !(SYNC&&SYNC.audio)) return; fetch(SYNC.audio+"/"+encodeURIComponent(id),{method:"DELETE",headers:{Authorization:"Bearer "+SYNC.token}}).catch(()=>{}); }

/* summarize the capture text via the small local LLM on the Mini */
let sumOriginal = "";
async function runSummarize(text){
  try{
    const r=await fetch(SYNC.summarize,{method:"POST",headers:{Authorization:"Bearer "+SYNC.token,"Content-Type":"application/json"},body:JSON.stringify({text})});
    if(!r.ok) throw new Error(r.status);
    const j=await r.json();

  }catch(e){ toast("Summarize failed — try again, or it's still loading the model"); }
}

function openSheet(title, bodyHtml){
  el("modalRoot").innerHTML = `<div class="scrim" data-act="scrimClose"><div class="sheet" data-stop><div class="grip"></div><h3>${esc(title)}</h3>${bodyHtml}</div></div>`;
}
function closeSheet(){ el("modalRoot").innerHTML=""; }

function sheetNewThread(){
  const projOpts = S.projects.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join("");
  openSheet("New thread",`
    <label class="fld">Title (a question or a line of thinking)</label>
    <input id="ntTitle" placeholder="e.g. Is the VP losing confidence in delivery?" />
    <label class="fld">Domain</label>
    <select id="ntDomain">${S.domains.map(([k,l])=>`<option value="${k}">${esc(l)}</option>`).join("")}</select>
    <label class="fld">Project (optional)</label>
    <select id="ntProject"><option value="">—</option>${projOpts}</select>
    <div class="btnrow" style="margin-top:16px"><button class="primary grow" data-act="createThread">Create</button><button class="ghost" data-act="closeSheet">Cancel</button></div>
  `);
}
function sheetSortThread(id){
  openSheet("Sort this thread",`
    <p class="muted sm">A thread closes only with a real outcome. Pick one:</p>
    <div class="seg" id="sortType" style="margin:10px 0">
      ${["decision","action","kill","park"].map((x,i)=>`<button class="${i===0?'on':''}" data-act="sortType" data-v="${x}">${x}</button>`).join("")}
    </div>
    <div id="sortFields"></div>
    <input type="hidden" id="sortTid" value="${id}" />
    <div class="btnrow" style="margin-top:16px"><button class="primary grow" data-act="confirmSort">Close thread</button><button class="ghost" data-act="closeSheet">Cancel</button></div>
  `);
  sortFields("decision");
}
let sortKind="decision";
function sortFields(kind){
  sortKind=kind;
  document.querySelectorAll('#sortType button').forEach(b=>b.classList.toggle('on',b.dataset.v===kind));
  let f="";
  if(kind==="decision"||kind==="action"){
    f=`<label class="fld">${kind==="decision"?"The decision + reasoning":"The action committed"}</label>
       <textarea id="soContent" rows="3" placeholder="${kind==="decision"?"I will… because…":"I will… (specific, doable)"}"></textarea>
       <label class="fld">${kind==="decision"?"Next checkpoint date":"Deadline"}</label>
       <input id="soDeadline" type="date" />`;
  } else if(kind==="kill"){
    f=`<label class="fld">Why this no longer matters</label><textarea id="soContent" rows="3" placeholder="No longer matters because…"></textarea>`;
  } else if(kind==="park"){
    f=`<label class="fld">Wake-up trigger (revisit when…)</label><textarea id="soContent" rows="3" placeholder="Revisit when X happens"></textarea>`;
  }
  el("sortFields").innerHTML=f;
}
function sheetRecordTurn(id){
  openSheet("Record Q&A",`
    <p class="muted sm">Paste the question Claude asked, and your answer.</p>
    <label class="fld">Question</label><textarea id="rtQ" rows="2"></textarea>
    <label class="fld">Your answer</label><textarea id="rtA" rows="3"></textarea>
    <input type="hidden" id="rtTid" value="${id}" />
    <div class="btnrow" style="margin-top:16px"><button class="primary grow" data-act="confirmTurn">Save</button><button class="ghost" data-act="closeSheet">Cancel</button></div>

}

  openSheet(kind==="goal"?"Edit life goal":"Edit thinking model",`
    <textarea id="leText" rows="6">${esc(arr[i]||"")}</textarea>
    <input type="hidden" id="leKind" value="${kind}"/><input type="hidden" id="leIdx" value="${i}"/>

/* ---- hash router: #/capture · #/threads[/filter] · #/thread/<id> · #/projects · #/project/<id> · #/global ---- */
const ROUTE_FILTERS = ["active","sorted","parked","killed","all"];
function navigate(h){ if(location.hash===h) applyHash(); else location.hash=h; }
function applyHash(){
  const parts = (location.hash||"").replace(/^#\/?/,"").split("/").filter(Boolean);
  const sec = parts[0] || "capture";
  if(sec==="threads"){ UI.tab="threads"; if(parts[1] && ROUTE_FILTERS.includes(parts[1])) threadFilter=parts[1]; }
  else if(sec==="thread"){ if(parts[1] && thread(parts[1])){ UI.tab="thread"; UI.threadId=parts[1]; } else UI.tab="threads"; }
  else if(sec==="projects"){ UI.tab="projects"; }
  else if(sec==="project"){ if(parts[1] && project(parts[1])){ UI.tab="project"; UI.projectId=parts[1]; } else UI.tab="projects"; }
  else if(sec==="global"){ UI.tab="global"; }
  else { UI.tab="capture"; }
  window.scrollTo(0,0); render();
}
function go(tab){ navigate("#/"+tab); }
function openThread(id){ navigate("#/thread/"+id); }
function openProject(id){ navigate("#/project/"+id); }
function touch(t){ t.lastActivityAt=now(); }

function saveFragment(){
  const body = el("capBody").value.trim();
  if(!body){ toast("Nothing to save"); return; }
  const f = {
    id:uid(), createdAt:now(), body,
    type: el("capType")?el("capType").value||null:null,
    threadId: el("capThread")?el("capThread").value||null:null,
    mode: UI.captureMode,
    fatigueLevel: capFatigue||null,
    voiceId: pendingAudio?pendingAudio.id:null,
    voiceBytes: pendingAudio?pendingAudio.bytes:0,
  };
  pendingAudio=null;
  S.fragments.push(f);
  if(f.threadId){ const t=thread(f.threadId); if(t) touch(t); }
  capFatigue=0; save();
  if(UI.captureMode==="engage_ai"){
    if(f.threadId){ copy(questionPrompt(thread(f.threadId))); }
    else { toast("Saved. Attach to a thread to get a question."); }
  } else { toast("✓ Logged"); }
  capDraft=""; el("capBody").value=""; render();
}

const ACT = {
  capMode(b){ UI.captureMode=b.dataset.v; render(); },
  fatigue(b){ capFatigue=+b.dataset.v; document.querySelectorAll('#capFatigue .chip').forEach(c=>c.classList.toggle('on',c===b)); },
  saveFragment,
  threadFilter(b){ navigate("#/threads/"+b.dataset.v); },
  newThread(){ sheetNewThread(); },
  newLifeThread(){ openSheet("New thread about my life",`<label class="fld">What's on your mind about your life right now?</label><input id="ntTitle" placeholder="e.g. Why do I always feel out of time and energy?"/><div class="btnrow" style="margin-top:16px"><button class="primary grow" data-act="createLifeThread">Create</button><button class="ghost" data-act="closeSheet">Cancel</button></div>`); },
  createLifeThread(){ const title=el("ntTitle").value.trim(); if(!title){toast("Title?");return;} const t={id:uid(),title,domain:"personal",projectId:null,status:"active",depthLevel:1,openedAt:now(),lastActivityAt:now(),outcome:null}; S.threads.push(t); save(); closeSheet(); openThread(t.id); },
  createThread(){
    const title=el("ntTitle").value.trim(); if(!title){toast("Title?");return;}
    const t={id:uid(),title,domain:el("ntDomain").value,projectId:el("ntProject").value||null,status:"active",depthLevel:1,openedAt:now(),lastActivityAt:now(),outcome:null};
    S.threads.push(t); save(); closeSheet(); openThread(t.id);
  },
  openThread(b){ openThread(b.dataset.id); },
  openProject(b){ openProject(b.dataset.id); },
  setDepth(b){ const t=thread(b.dataset.id); if(t){t.depthLevel=+b.value; touch(t); save();} },
  questionPrompt(b){ const t=thread(b.dataset.id); copy(questionPrompt(t)); },
  coherence(){ copy(coherencePrompt()); },
  addFragmentTo(b){ UI.tab="capture"; render(); setTimeout(()=>{ const s=el("capThread"); if(s){s.value=b.dataset.id;} UI.captureMode="engage_ai"; el("capBody").focus(); },30); toast("Capturing into this thread"); },
  recordTurn(b){ sheetRecordTurn(b.dataset.id); },
  confirmTurn(){
    const q=el("rtQ").value.trim(), a=el("rtA").value.trim(), id=el("rtTid").value;
    if(!q){toast("Question?");return;}
    S.turns.push({id:uid(),threadId:id,createdAt:now(),question:q,answer:a||null});
    const t=thread(id); if(t)touch(t); save(); closeSheet(); render();
  },
  answerTurn(b){
    const tn=S.turns.find(x=>x.id===b.dataset.id); if(!tn)return;
    sheetText("Your answer","Answer…","saveAnswer"); el("modalRoot").dataset.turn=tn.id;
  },
  saveAnswer(){ const id=el("modalRoot").dataset.turn; const tn=S.turns.find(x=>x.id===id); if(tn){tn.answer=el("stInput").value.trim()||null; const t=thread(tn.threadId); if(t)touch(t); save();} closeSheet(); render(); },
  sortThread(b){ sheetSortThread(b.dataset.id); },
  sortType(b){ sortFields(b.dataset.v); },
  confirmSort(){
    const id=el("sortTid").value; const t=thread(id); if(!t)return;
    const content=el("soContent")?el("soContent").value.trim():"";
    const deadlineEl=el("soDeadline"); const deadline=deadlineEl&&deadlineEl.value?new Date(deadlineEl.value).getTime():null;
    if(!content){ toast("This thread can't close without it"); return; }
    if((sortKind==="decision"||sortKind==="action") && !deadline){ toast("A date is required"); return; }
    t.outcome={type:sortKind,content,deadline:deadline||null,wakeTrigger:sortKind==="park"?content:null,reasoning:content};
    t.status = sortKind==="kill"?"killed":sortKind==="park"?"parked":"sorted";
    touch(t); save(); closeSheet(); render();
  },
  reopen(b){ const t=thread(b.dataset.id); if(t){t.status="active"; t.outcome=null; touch(t); save(); render();} },
  deleteThread(b){ if(!confirm("Delete this thread? Its fragments stay (unassigned).")) return; const id=b.dataset.id; S.fragments.forEach(f=>{if(f.threadId===id)f.threadId=null;}); S.turns=S.turns.filter(t=>t.threadId!==id); S.threads=S.threads.filter(t=>t.id!==id); save(); go("threads"); },
  linkProject(b){ const opts=S.projects.map(p=>`<button class="grow" data-act="doLink" data-tid="${b.dataset.id}" data-pid="${p.id}" style="margin-bottom:6px;text-align:left">${esc(p.name)}</button>`).join(""); openSheet("Link project",opts||'<p class="muted sm">No projects yet.</p>'); },
  doLink(b){ const t=thread(b.dataset.tid); if(t){t.projectId=b.dataset.pid; if(project(b.dataset.pid))t.domain=project(b.dataset.pid).domain; save();} closeSheet(); render(); },
  assignFragment(b){ sheetAssign(b.dataset.id); },
  editFragment(b){ const f=S.fragments.find(x=>x.id===b.dataset.id); if(!f)return; openSheet("Edit fragment",`<textarea id="efText" rows="5">${esc(f.body)}</textarea><input type="hidden" id="efId" value="${f.id}"/><div class="btnrow" style="margin-top:14px"><button class="primary grow" data-act="saveEditFragment">Save</button><button class="ghost" data-act="closeSheet">Cancel</button></div>`); },
  saveEditFragment(){ const id=el("efId").value, v=el("efText").value.trim(); const f=S.fragments.find(x=>x.id===id); if(f&&v){ f.body=v; const t=thread(f.threadId); if(t)touch(t); save(); } closeSheet(); render(); },
  deleteFragment(b){ const f=S.fragments.find(x=>x.id===b.dataset.id); if(!f)return; if(!confirm("Delete this fragment? Its audio (if any) is deleted too."))return; if(f.voiceId) deleteAudio(f.voiceId); const t=thread(f.threadId); S.fragments=S.fragments.filter(x=>x.id!==f.id); if(t)touch(t); save(); render(); },
  assignTo(b){ const f=S.fragments.find(x=>x.id===b.dataset.fid); if(f){f.threadId=b.dataset.tid; const t=thread(b.dataset.tid); if(t)touch(t); save();} closeSheet(); render(); },
  newThreadFor(b){ const f=S.fragments.find(x=>x.id===b.dataset.fid); closeSheet(); sheetNewThread(); if(f)setTimeout(()=>{el("ntTitle").value=f.body.slice(0,80);},30); el("modalRoot").dataset.frag=b.dataset.fid; },
  newProject(){ sheetProject(null); },
  editProject(b){ sheetProject(project(b.dataset.id)); },
  saveProject(){
    const id=el("pId").value; const name=el("pName").value.trim(); if(!name){toast("Name?");return;}
    const data={name,domain:el("pDomain").value,goal:el("pGoal").value.trim(),role:el("pRole").value.trim()};
    if(id){ Object.assign(project(id),data); } else { const p={id:uid(),...data}; S.projects.push(p); }
    save(); closeSheet(); render();
  },
  deleteProject(b){ if(!confirm("Delete project? Threads keep their data but unlink.")) return; const id=b.dataset.id; S.threads.forEach(t=>{if(t.projectId===id)t.projectId=null;}); S.projects=S.projects.filter(p=>p.id!==id); save(); go("projects"); },
  addGoal(){ sheetText("Add life goal","An ultimate goal everything should serve…","saveGoal"); },
  saveGoal(){ const v=el("stInput").value.trim(); if(v){S.global.goals.push(v); save();} closeSheet(); render(); },
  editGoal(b){ openListEdit("goal", +b.dataset.i); },
  editModel(b){ openListEdit("model", +b.dataset.i); },
  saveListEdit(){ const kind=el("leKind").value, i=+el("leIdx").value, v=el("leText").value.trim(); const arr = kind==="goal"?S.global.goals:S.global.models; if(v) arr[i]=v; save(); closeSheet(); render(); },
  delGoal(b){ if(!confirm("Delete this life goal?")) return; S.global.goals.splice(+b.dataset.i,1); save(); render(); },
  addModel(){ sheetText("Add thinking model","e.g. invert · margin of safety · opportunity cost","saveModel"); },
  saveModel(){ const v=el("stInput").value.trim(); if(v){S.global.models.push(v); save();} closeSheet(); render(); },
  delModel(b){ if(!confirm("Delete this thinking model?")) return; S.global.models.splice(+b.dataset.i,1); save(); render(); },
  addDomain(){ sheetText("Add domain","e.g. Health · Side project · Community","saveDomain"); },
  saveDomain(){ const v=el("stInput").value.trim(); if(v){ S.domains.push([domainSlug(v), v]); save(); } closeSheet(); render(); },
  editDomain(b){ const i=+b.dataset.i; openSheet("Rename domain",`<input id="dmText" value="${esc(S.domains[i][1])}"/><input type="hidden" id="dmIdx" value="${i}"/><div class="btnrow" style="margin-top:14px"><button class="primary grow" data-act="saveDomainEdit">Save</button><button class="ghost" data-act="closeSheet">Cancel</button></div>`); },
  saveDomainEdit(){ const i=+el("dmIdx").value, v=el("dmText").value.trim(); if(v){ S.domains[i][1]=v; save(); } closeSheet(); render(); },
  delDomain(b){ const i=+b.dataset.i, key=S.domains[i][0]; const used=S.projects.filter(p=>p.domain===key).length+S.threads.filter(t=>t.domain===key).length; if(!confirm(`Delete this domain?${used?` ${used} item(s) use it — they'll keep showing this label until you re-tag them.`:""}`)) return; S.domains.splice(i,1); save(); render(); },
  addFragType(){ sheetText("Add fragment type","e.g. idea · worry · win · gratitude","saveFragType"); },
  saveFragType(){ const v=el("stInput").value.trim().toLowerCase(); if(v && !S.fragTypes.includes(v)){ S.fragTypes.push(v); save(); } closeSheet(); render(); },
  delFragType(b){ S.fragTypes.splice(+b.dataset.i,1); save(); render(); },
  export(){ doExport(); },
  import(){ doImport(); },
  syncNow(){ pull(); },
  record(){ recordToggle(); },
  reRecord(){ deleteAudio(el("tcAudio").value); closeSheet(); recordToggle(); },
  useTranscript(){ const t=el("tcText").value.trim(); const ta=el("capBody"); if(ta){ ta.value = ta.value.trim() ? (ta.value.trim()+" "+t) : t; } const aid=el("tcAudio").value; pendingAudio = aid ? {id:aid, bytes:+(el("tcBytes").value||0)} : null; closeSheet(); if(ta){ capInput(); ta.focus(); } },
  discardTranscript(){ deleteAudio(el("tcAudio").value); closeSheet(); setRecStatus(""); toast("Recording discarded & deleted"); },
  async audioRefresh(){
    const e=el("audioStat"), list=el("audioList");
    if(!(SYNC&&SYNC.audio)){ if(e)e.textContent="(needs the Mini)"; return; }
    if(e)e.textContent="checking…";
    try{
      const r=await fetch(SYNC.audio+"/list",{headers:{Authorization:"Bearer "+SYNC.token}});
      const arr=await r.json();
      const bytes=arr.reduce((s,a)=>s+(a.bytes||0),0);
      if(e)e.textContent=`${arr.length} clip${arr.length===1?"":"s"} · ${(bytes/1048576).toFixed(1)} MB on the Mini`;
      if(list) list.innerHTML = arr.length ? arr.map(a=>{
        const url=SYNC.audio+"/"+encodeURIComponent(a.name)+"?t="+encodeURIComponent(SYNC.token);
        return `<div class="card" style="padding:10px;margin-top:8px"><div class="row sm" style="gap:8px"><span class="grow truncate">${esc(a.name)}</span><span class="faint">${(a.bytes/1024).toFixed(0)} KB</span><button class="sm ghost danger" data-act="audioDelOne" data-id="${esc(a.name)}">✕</button></div><audio controls preload="none" src="${url}" style="width:100%;margin-top:8px;height:34px"></audio></div>`;
      }).join("") : `<div class="muted sm" style="margin-top:8px">No recordings stored.</div>`;
    }catch(x){ if(e)e.textContent="(couldn't reach the Mini)"; }
  },
  async audioDelOne(b){ if(!confirm("Delete this recording?")) return; await fetch(SYNC.audio+"/"+encodeURIComponent(b.dataset.id),{method:"DELETE",headers:{Authorization:"Bearer "+SYNC.token}}).catch(()=>{}); ACT.audioRefresh(); },
  summarize(){ const ta=el("capBody"); const text=(ta?ta.value:"").trim(); if(!text){ toast("Type or record something first"); return; } if(!(SYNC&&SYNC.summarize)){ toast("Summarize needs the Mini"); return; } sumOriginal=text; toast("✦ summarizing on your Mini… (a few seconds)"); runSummarize(text); },
  trySummaryAgain(){ closeSheet(); toast("✦ trying again…"); runSummarize(sumOriginal); },
  acceptSummary(){ const v=el("smText").value.trim(); const ta=el("capBody"); if(ta&&v){ ta.value=v; } capDraft = ta?ta.value:v; closeSheet(); capInput(); if(ta)ta.focus(); toast("Replaced with summary"); },
  discardSummary(){ closeSheet(); },
  audioPurge(){ if(!(SYNC&&SYNC.audio)) return; if(!confirm("Permanently delete ALL stored voice audio on the Mini? Your transcribed text stays.")) return; fetch(SYNC.audio,{method:"DELETE",headers:{Authorization:"Bearer "+SYNC.token}}).then(r=>r.json()).then(j=>{ toast("Deleted "+j.deleted+" audio file(s)"); ACT.audioRefresh(); }).catch(()=>toast("Delete failed")); },
  pickSuggest(b){ const s=el("capThread"); if(s) s.value=b.dataset.tid; capInput(); },
  unpickSuggest(){ const s=el("capThread"); if(s) s.value=""; capInput(); },
  threadMd(b){ copy(threadMarkdown(thread(b.dataset.id))); },
  corpusMd(){ copy(corpusMarkdown()); },
  copyFragment(b){ const f=S.fragments.find(x=>x.id===b.dataset.id); if(f) copy(fragmentText(f)); },
  copyThread(b){ const t=thread(b.dataset.id); if(t) copy(threadMarkdown(t)); },
  copyGoal(b){ const g=S.global.goals[+b.dataset.i]; if(g!=null) copy("Life goal:\n"+g); },
  copyModel(b){ const m=S.global.models[+b.dataset.i]; if(m!=null) copy("Thinking model:\n"+m); },
  closeSheet(){ closeSheet(); },
  scrimClose(){ closeSheet(); },
};

/* override newThreadFor → createThread to also attach fragment */
const _createThread = ACT.createThread;
ACT.createThread = function(){
  const fid = el("modalRoot").dataset.frag;
  _createThread();
  if(fid){ const t=S.threads[S.threads.length-1]; const f=S.fragments.find(x=>x.id===fid); if(f&&t){f.threadId=t.id; save();} delete el("modalRoot").dataset.frag; }
};

/* ---------- backup ---------- */
function doExport(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  const d=new Date(); const stamp=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  a.href=url; a.download=`thread-backup-${stamp}.json`; a.click();
  URL.revokeObjectURL(url);
  S.meta.lastBackup=now(); save(); render(); toast("✓ Backup downloaded");
}
function doImport(){
  const inp=document.createElement("input"); inp.type="file"; inp.accept="application/json,.json";
  inp.onchange=()=>{ const file=inp.files[0]; if(!file)return; const r=new FileReader();
    r.onload=()=>{ try{ const data=migrate(JSON.parse(r.result)); if(!confirm("Replace ALL current data with this backup?"))return; S=data; save(); render(); toast("✓ Restored"); }catch(e){ toast("Invalid file"); } };
    r.readAsText(file); };
  inp.click();
}

/* ============================================================
   SYNC — self-hosted on the Mac Mini (window.LOOM_SYNC injected by server)
   Local-only if absent. Whole-document last-write-wins by meta.updatedAt.
   ============================================================ */
const SYNC = (typeof window!=="undefined" && window.LOOM_SYNC) || null;
let syncStatus = SYNC ? "idle" : "off";   // off | idle | syncing | ok | offline
let syncLast = 0, pushTimer = null, pulling = false;

function syncLabel(){
  if(syncStatus==="off") return "";
  const map={idle:"· sync ready",syncing:"· syncing…",ok:"· ✓ synced",offline:"· ⚠ offline"};
  const color = syncStatus==="offline" ? "var(--warn)" : "var(--muted)";
  return ` <span data-act="syncNow" style="cursor:pointer;color:${color}">${map[syncStatus]||""}</span>`;
}
function updateHeader(){ const sub=el("hSub"); if(!sub) return; const n=activeThreads().length; sub.innerHTML=`${n} active thread${n===1?"":"s"}`+backupNudge()+syncLabel(); }

async function pull(){
  if(!SYNC || pulling) return;
  pulling=true; if(syncStatus!=="ok") syncStatus="syncing"; updateHeader();
  try{
    const r=await fetch(SYNC.url,{headers:{Authorization:"Bearer "+SYNC.token},cache:"no-store"});
    if(!r.ok) throw new Error(r.status);
    const remote=await r.json();
    const rV=(remote&&remote.meta&&remote.meta.updatedAt)||0;
    const lV=(S.meta&&S.meta.updatedAt)||0;
    if(rV>lV){ S=migrate(remote); persist(); syncStatus="ok"; syncLast=now(); applyHash(); }
    else if(lV>rV){ syncStatus="ok"; await push(true); }
    else { syncStatus="ok"; syncLast=now(); updateHeader(); }
  }catch(e){ syncStatus="offline"; updateHeader(); }
  finally{ pulling=false; }
}
function schedulePush(){ if(!SYNC) return; clearTimeout(pushTimer); pushTimer=setTimeout(()=>push(),1200); }
async function push(silent){
  if(!SYNC) return;
  if(!silent){ syncStatus="syncing"; updateHeader(); }
  try{
    const r=await fetch(SYNC.url,{method:"PUT",headers:{Authorization:"Bearer "+SYNC.token,"Content-Type":"application/json"},body:JSON.stringify(S)});
    if(r.status===409){ const remote=await r.json(); if(((remote.meta&&remote.meta.updatedAt)||0)>((S.meta&&S.meta.updatedAt)||0)){ S=migrate(remote); persist(); render(); } syncStatus="ok"; syncLast=now(); updateHeader(); return; }
    if(!r.ok) throw new Error(r.status);
    syncStatus="ok"; syncLast=now(); updateHeader();
  }catch(e){ syncStatus="offline"; updateHeader(); }
}
function initSync(){
  if("serviceWorker" in navigator && (SYNC || location.protocol==="https:")){
    const swUrl = (SYNC && SYNC.sw) ? SYNC.sw : "sw.js";
    const opts = (SYNC && SYNC.scope) ? {scope:SYNC.scope} : undefined;
    navigator.serviceWorker.register(swUrl, opts).catch(()=>{});
  }
  if(!SYNC) return;
  pull();
  document.addEventListener("visibilitychange",()=>{ if(!document.hidden) pull(); });
}

/* ============================================================
   EVENT DELEGATION
   ============================================================ */
document.addEventListener("click", e=>{
  const tabBtn = e.target.closest("[data-tab]");
  if(tabBtn){ go(tabBtn.dataset.tab); return; }
  const a = e.target.closest("[data-act]");
  if(!a) return;
  // a click inside the sheet that only resolves to the backdrop = empty space; don't close
  if(a.dataset.act === "scrimClose" && e.target.closest("[data-stop]")) return;
  const fn = ACT[a.dataset.act];
  if(fn){ e.preventDefault(); fn(a); }
}, false);

/* NOTE: no auto-seed. A previous version re-seeded default models whenever the
   doc looked empty and called save() — which bumped updatedAt and pushed, so a
   stale device kept clobbering the synced state on every open. The server (Mini)
   is the source of truth; new devices start empty and pull it. */

window.addEventListener("hashchange", applyHash);
applyHash();      // route from the URL (defaults to #/capture)
initSync();
</script>
